<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Scanner Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #007aff;
            --danger: #ff3b30;
            --glass: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* Экраны */
        .screen {
            display: none; width: 100%; height: 100%;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .active { display: flex; }

        /* Главная кнопка + */
        .btn-main {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, var(--accent), #5856d6);
            border-radius: 50%; border: none;
            color: white; font-size: 60px; font-weight: 200;
            box-shadow: 0 10px 40px rgba(0, 122, 255, 0.4);
            cursor: pointer; transition: 0.3s;
        }
        .btn-main:active { transform: scale(0.9); }

        /* Камера и интерфейс записи */
        #videoElement {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0; z-index: 1;
        }
        .overlay {
            position: absolute; bottom: 50px; z-index: 10;
            width: 100%; display: flex; justify-content: center;
        }
        .btn-record {
            padding: 20px 40px; border-radius: 40px;
            background: var(--glass); border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(15px); color: white;
            font-size: 18px; font-weight: 600; text-transform: uppercase;
        }

        /* Индикатор записи */
        .recording-dot {
            width: 12px; height: 12px; background: var(--danger);
            border-radius: 50%; display: inline-block; margin-right: 10px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; }
        }

        h1 { font-size: 22px; font-weight: 300; letter-spacing: 1px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <h1>3D SCANNER</h1>
        <div style="flex-grow: 1; display: flex; align-items: center;">
            <button class="btn-main" onclick="startCamera()">+</button>
        </div>
        <p style="color: #666; margin-bottom: 40px;">Нажми +, чтобы начать съемку</p>
    </div>

    <div id="screen-camera" class="screen">
        <video id="videoElement" autoplay playsinline muted></video>
        <div class="overlay">
            <button class="btn-record" id="recordBtn" onclick="toggleRecording()">Начать запись</button>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let recordedChunks = [];
        let stream;

        const home = document.getElementById('screen-home');
        const camView = document.getElementById('screen-camera');
        const video = document.getElementById('videoElement');
        const recordBtn = document.getElementById('recordBtn');

        // Запуск камеры
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }, 
                    audio: false 
                });
                video.srcObject = stream;
                home.classList.remove('active');
                camView.classList.add('active');
                
                // Настройка записи
                recordedChunks = [];
                let options = { mimeType: 'video/webm; codecs=vp9' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/mp4' };
                }
                mediaRecorder = new MediaRecorder(stream, options);

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = exportVideo;

            } catch (err) {
                alert("Ошибка камеры: " + err);
            }
        }

        // Старт/Стоп записи
        function toggleRecording() {
            if (mediaRecorder.state === "inactive") {
                mediaRecorder.start();
                recordBtn.innerHTML = '<span class="recording-dot"></span> Идет запись...';
                recordBtn.style.borderColor = "var(--danger)";
            } else {
                mediaRecorder.stop();
                stopCamera();
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        }

        // Скачивание видео
        function exportVideo() {
            const blob = new Blob(recordedChunks, { type: "video/mp4" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement("a");
            a.href = url;
            a.download = `3D_SCAN_${Date.now()}.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            alert("Запись сохранена! Теперь загрузи это видео в Polycam или Luma AI для создания 3D модели.");
            location.reload(); // Возвращаем на главный экран
        }
    </script>
</body>
</html>
