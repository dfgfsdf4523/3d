<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Scanner Web</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --accent: #2979ff;
            --text: #ffffff;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Запрещаем скролл */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Экраны */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0; left: 0;
        }
        .active { display: flex; }

        /* Дизайн главной кнопки с эффектом свечения */
        .btn-add {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #2979ff, #00e5ff);
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(41, 121, 255, 0.5);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-add:active { transform: scale(0.9); }

        h1 { font-weight: 600; font-size: 24px; margin-bottom: 40px; }

        /* Экран камеры */
        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            z-index: 1;
        }
        .ui-overlay {
            position: absolute;
            bottom: 40px;
            z-index: 2;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 3D Вьювер */
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <h1>Мои 3D Комнаты</h1>
        <button class="btn-add" onclick="startCamera()">+</button>
    </div>

    <div id="screen-camera" class="screen">
        <video id="videoElement" autoplay playsinline></video>
        <div class="ui-overlay" id="recordBtn" onclick="simulateRecording()">Начать сканирование</div>
    </div>

    <div id="screen-loading" class="screen">
        <h2>Обработка данных...</h2>
        <p style="color: #888;">Создаем 3D модель (это займет пару секунд)</p>
    </div>

    <div id="screen-viewer" class="screen">
        <button class="close-btn" onclick="goHome()">Закрыть</button>
        <model-viewer 
            src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" 
            camera-controls 
            auto-rotate 
            ar>
        </model-viewer>
    </div>

    <script>
       let mediaRecorder;
        let recordedChunks = [];

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: 1280, height: 720 }, 
                    audio: false 
                });
                video.srcObject = stream;
                showScreen('screen-camera');
                
                // Подготавливаем запись
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };
            } catch (err) {
                alert("Ошибка камеры: " + err);
            }
        }

        function simulateRecording() {
            if (mediaRecorder.state === "inactive") {
                mediaRecorder.start();
                recordBtn.innerText = "СТОП (Нажми, когда закончишь)";
                recordBtn.style.background = "red";
            } else {
                mediaRecorder.stop();
                stopCamera();
                processScan();
            }
        }

        function processScan() {
            showScreen('screen-loading');
            
            // Создаем видеофайл из записанных кусочков
            const blob = new Blob(recordedChunks, { type: "video/mp4" });
            const videoUrl = URL.createObjectURL(blob);

            // ИМИТАЦИЯ ОТПРАВКИ НА LUMA AI
            console.log("Видео готово к отправке на сервер:", videoUrl);

            setTimeout(() => {
                // Здесь в будущем будет ссылка на твою реальную модель от Luma AI
                showScreen('screen-viewer');
                alert("Видео записано! Теперь его нужно отправить в Luma AI для генерации 3D.");
            }, 3000);
        }
    </script>
</body>
</html>
