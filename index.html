<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Scanner Web</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --accent: #2979ff;
            --text: #ffffff;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Запрещаем скролл */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Экраны */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0; left: 0;
        }
        .active { display: flex; }

        /* Дизайн главной кнопки с эффектом свечения */
        .btn-add {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #2979ff, #00e5ff);
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(41, 121, 255, 0.5);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-add:active { transform: scale(0.9); }

        h1 { font-weight: 600; font-size: 24px; margin-bottom: 40px; }

        /* Экран камеры */
        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            z-index: 1;
        }
        .ui-overlay {
            position: absolute;
            bottom: 40px;
            z-index: 2;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 3D Вьювер */
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <h1>Мои 3D Комнаты</h1>
        <button class="btn-add" onclick="startCamera()">+</button>
    </div>

    <div id="screen-camera" class="screen">
        <video id="videoElement" autoplay playsinline></video>
        <div class="ui-overlay" id="recordBtn" onclick="simulateRecording()">Начать сканирование</div>
    </div>

    <div id="screen-loading" class="screen">
        <h2>Обработка данных...</h2>
        <p style="color: #888;">Создаем 3D модель (это займет пару секунд)</p>
    </div>

    <div id="screen-viewer" class="screen">
        <button class="close-btn" onclick="goHome()">Закрыть</button>
        <model-viewer 
            src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" 
            camera-controls 
            auto-rotate 
            ar>
        </model-viewer>
    </div>

    <script>
        const screenHome = document.getElementById('screen-home');
        const screenCamera = document.getElementById('screen-camera');
        const screenLoading = document.getElementById('screen-loading');
        const screenViewer = document.getElementById('screen-viewer');
        const video = document.getElementById('videoElement');
        const recordBtn = document.getElementById('recordBtn');

        let stream;

        // Переключение экранов
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Запуск камеры
        async function startCamera() {
            try {
                // Запрашиваем заднюю камеру смартфона
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                video.srcObject = stream;
                showScreen('screen-camera');
            } catch (err) {
                alert("Нет доступа к камере. Разрешите доступ в настройках браузера.");
            }
        }

        // Имитация записи и отправки на сервер
        function simulateRecording() {
            recordBtn.innerText = "Сканирование (Обойдите комнату)...";
            recordBtn.style.background = "rgba(255, 0, 0, 0.6)";

            // Ждем 5 секунд (типа записываем видео)
            setTimeout(() => {
                stopCamera();
                showScreen('screen-loading');

                // Имитируем ожидание ответа от сервера с готовой моделью (еще 3 секунды)
                setTimeout(() => {
                    showScreen('screen-viewer');
                }, 3000);

            }, 5000);
        }

        // Отключение камеры для экономии батареи
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            recordBtn.innerText = "Начать сканирование";
            recordBtn.style.background = "rgba(0, 0, 0, 0.5)";
        }

        // Возврат на главный экран
        function goHome() {
            stopCamera();
            showScreen('screen-home');
        }
    </script>
</body>
</html>
